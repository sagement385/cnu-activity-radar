services:
  - type: web
    name: cnu-activity-radar
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm exec next start -H 0.0.0.0 -p $PORT
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NEXT_PUBLIC_APP_URL
        value: https://cnu-activity-radar.onrender.com
      - key: CRON_SECRET
        generateValue: true
      - key: DASHBOARD_SECRET
        value: disabled
      - key: SCRAPE_ON_PAGE_LOAD
        value: "true"
      - key: SCRAPE_MIN_INTERVAL_MINUTES
        value: "60"
      - key: USE_SUPABASE
        value: "false"
      - key: AI_PROVIDER
        value: none
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
