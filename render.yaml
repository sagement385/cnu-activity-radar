services:
  - type: web
    name: cnu-activity-radar
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NEXT_PUBLIC_APP_URL
        value: https://cnu-activity-radar.onrender.com
      - key: CRON_SECRET
        generateValue: true
      - key: DASHBOARD_SECRET
        generateValue: true
      - key: SCRAPE_ON_PAGE_LOAD
        value: "true"
      - key: SCRAPE_MIN_INTERVAL_MINUTES
        value: "60"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AI_PROVIDER
        value: none
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
